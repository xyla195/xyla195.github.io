<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Panel Kontrol</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md p-8 space-y-6 bg-white rounded-2xl shadow-xl">
        <div class="text-center">
            <h1 class="text-3xl font-extrabold text-gray-900">Admin Login</h1>
            <p class="text-sm text-gray-500 mt-2">Masuk untuk mengelola web portofolio Anda</p>
            <div class="mt-2 text-xs bg-yellow-100 text-yellow-800 p-2 rounded inline-block">
                Mode Statis (Gunakan: admin / admin)
            </div>
        </div>
        
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block mb-2 text-sm font-semibold text-gray-700">Username</label>
                <input type="text" id="username" required placeholder="admin" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>
            <div>
                <label class="block mb-2 text-sm font-semibold text-gray-700">Password</label>
                <input type="password" id="password" required placeholder="••••••••" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>
            
            <div id="errorMessage" class="text-red-500 text-sm font-medium hidden"></div>
            
            <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow transition">
                Masuk
            </button>
        </form>

        <div class="text-center mt-4">
            <a href="../../index.html" class="text-sm text-blue-500 hover:text-blue-700 font-medium transition">
                <i class="fas fa-arrow-left mr-1"></i> Kembali ke Beranda
            </a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const errDiv = document.getElementById('errorMessage');
            const btn = document.getElementById('submitBtn');
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            // Sembunyikan error dan ubah status tombol
            errDiv.classList.add('hidden');
            btn.innerText = 'Memeriksa...';
            btn.disabled = true;

            // Simulasi loading server selama 1 detik (agar terasa nyata)
            setTimeout(() => {
                if (user === 'admin' && pass === 'admin') {
                    // Berhasil login, arahkan ke file dashboard statis
                    window.location.href = 'dashboard.html';
                } else {
                    // Gagal login
                    errDiv.innerText = 'Username atau password salah!';
                    errDiv.classList.remove('hidden');
                    btn.innerText = 'Masuk';
                    btn.disabled = false;
                }
            }, 1000);
        });
    </script>
</body>
</html>
